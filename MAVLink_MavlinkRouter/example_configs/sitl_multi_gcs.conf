# mavlink-router configuration for SITL with multiple GCS
# Use case: Route SITL to multiple ground control stations
#
# Usage:
#   1. Start SITL: Tools/autotest/sim_vehicle.py -v ArduPlane -L CMAC --console --map
#   2. Start router: mavlink-routerd -c sitl_multi_gcs.conf
#   3. Connect Mission Planner to 127.0.0.1:14560
#   4. Connect QGroundControl to UDP port 14570

[General]
TcpServerPort = 5790
ReportStats = 60

# SITL outputs to this port
[UdpEndpoint sitl]
Mode = Normal
Address = 127.0.0.1
Port = 14550

# Mission Planner endpoint
[UdpEndpoint missionplanner]
Mode = Normal
Address = 127.0.0.1
Port = 14560

# QGroundControl endpoint
[UdpEndpoint qgroundcontrol]
Mode = Normal
Address = 127.0.0.1
Port = 14570

# Python scripts endpoint
[UdpEndpoint scripts]
Mode = Normal
Address = 127.0.0.1
Port = 14580
