# mavlink-router configuration for companion computer (Raspberry Pi)
# Use case: Autopilot on serial, route to onboard scripts and remote GCS
#
# Setup:
#   1. Connect autopilot to Raspberry Pi serial port (UART or USB)
#   2. Configure SERIAL2_PROTOCOL = 2 (MAVLink2) and SERIAL2_BAUD = 921
#   3. Place this file in /etc/mavlink-router/main.conf
#   4. Enable service: sudo systemctl enable mavlink-router
#   5. Start service: sudo systemctl start mavlink-router
#
# Note: Adjust Device path and remote GCS Address to match your setup

[General]
TcpServerPort = 5790
ReportStats = 60

# Enable logging
Log = /home/pi/mavlink-logs
MaxLogFiles = 50
DebugLogLevel = info

# Autopilot on serial (adjust device path)
# For Raspberry Pi: /dev/ttyAMA0 (UART) or /dev/ttyUSB0 (USB)
[UartEndpoint autopilot]
Device = /dev/ttyAMA0
Baud = 921600
FlowControl = false

# Onboard scripts (localhost)
[UdpEndpoint local_scripts]
Mode = Normal
Address = 127.0.0.1
Port = 14550

# Remote GCS over WiFi/Ethernet
# Change Address to your GCS computer IP
[UdpEndpoint remote_gcs]
Mode = Normal
Address = 192.168.1.100
Port = 14550

# TCP server for dynamic connections
# Connect with: tcp:<pi_ip>:5760
[TcpEndpoint tcp_server]
Mode = Server
Port = 5760

# Backup telemetry (optional - e.g., LTE modem)
# [UartEndpoint backup_radio]
# Device = /dev/ttyUSB1
# Baud = 57600
