# mavlink-router configuration for telemetry radio
# Use case: Telemetry radio on USB, route to multiple local applications
#
# Usage:
#   1. Connect telemetry radio to USB (appears as /dev/ttyUSB0)
#   2. Start router: mavlink-routerd -c telemetry_radio.conf
#   3. Connect applications to specified UDP ports
#
# Note: Adjust Device path and Baud rate to match your radio

[General]
TcpServerPort = 5790
ReportStats = 60

# Enable logging (optional)
# Log = /home/user/mavlink-logs
# MaxLogFiles = 20

# Telemetry radio on USB
[UartEndpoint telemetry]
Device = /dev/ttyUSB0
Baud = 57600
FlowControl = false

# Mission Planner
[UdpEndpoint missionplanner]
Mode = Normal
Address = 127.0.0.1
Port = 14550

# QGroundControl
[UdpEndpoint qgroundcontrol]
Mode = Normal
Address = 127.0.0.1
Port = 14551

# Custom monitoring script
[UdpEndpoint monitor]
Mode = Normal
Address = 127.0.0.1
Port = 14555
